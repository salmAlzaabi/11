<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Live Monitoring</title>
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شريط التايمر */
        .system-status {
            width: 100%;
            max-width: 1000px;
            background: rgba(88, 166, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        #timer { font-family: monospace; color: #f0883e; font-size: 1.3rem; }

        /* حاوية الحسابات (الواجهتين) */
        .profiles-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .profile-card {
            flex: 1;
            min-width: 320px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
        }

        .profile-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* الجزء العلوي (الهيدر) خلفية البروفايل */
        .profile-header {
            height: 100px;
            background: linear-gradient(45deg, #1f2937, #0d1117);
            border-bottom: 1px solid var(--border);
        }

        .pfp-wrapper {
            margin-top: -50px;
            position: relative;
            display: inline-block;
        }

        .profile-card img.pfp {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            background: var(--card-bg);
        }

        .profile-info { padding: 20px; text-align: center; }

        .profile-info h2 { margin: 10px 0 5px 0; font-size: 1.4rem; }
        .profile-info a { color: var(--accent); text-decoration: none; font-weight: 600; }

        .bio-box {
            background: #0d1117;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            color: var(--text-dim);
            min-height: 60px;
            border: 1px inset var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        .stat-item span { display: block; font-weight: bold; color: var(--accent); }
        .stat-item label { font-size: 0.75rem; color: var(--text-dim); }

        /* سجل اللوقات في الأسفل */
        .log-box {
            width: 100%;
            max-width: 1000px;
            margin-top: 30px;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .log-entry {
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            padding: 8px;
            border-bottom: 1px solid #21262d;
            color: #7d8590;
            display: flex;
            gap: 10px;
        }

        .log-time { color: #58a6ff; min-width: 130px; }
    </style>
</head>
<body>

    <div class="system-status">
        <div>📡 نظام المراقبة النشط: <strong>LIVE_SYNC</strong></div>
        <div style="margin-top: 5px;">تحديث السيرفر القادم خلال: <span id="timer">60s</span></div>
    </div>

    <div id="profiles-grid" class="profiles-container">
        </div>

    <div class="log-box">
        <div style="color: #f0883e; margin-bottom: 15px; font-weight: bold;">[ SYSTEM_OPERATIONS_LOG ]</div>
        <div id="logs-container"></div>
    </div>

<script>
    let timeLeft = 60;

    async function fetchData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            const data = await response.json();
            
            // تحديث واجهات الحسابات
            const grid = document.getElementById('profiles-grid');
            grid.innerHTML = '';
            
            data.profiles.forEach(p => {
                grid.innerHTML += `
                    <div class="profile-card">
                        <div class="profile-header"></div>
                        <div class="profile-info">
                            <div class="pfp-wrapper">
                                <img src="${p.pfp}" class="pfp" alt="PFP">
                            </div>
                            <h2>${p.full_name}</h2>
                            <a href="https://instagram.com/${p.username}" target="_blank">@${p.username}</a>
                            <div class="bio-box">${p.bio || 'لا يوجد وصف حالياً'}</div>
                            <div class="stats-grid">
                                <div class="stat-item"><span>${p.followers.toLocaleString()}</span><label>متابع</label></div>
                                <div class="stat-item"><span>ID</span><label>${p.id}</label></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // تحديث اللوقات
            const logsBox = document.getElementById('logs-container');
            logsBox.innerHTML = '';
            data.logs.reverse().forEach(log => {
                const parts = log.split('] ');
                const time = parts[0].replace('[', '');
                const msg = parts[1];
                logsBox.innerHTML += `
                    <div class="log-entry">
                        <span class="log-time">${time}</span>
                        <span class="log-msg">${msg}</span>
                    </div>`;
            });

        } catch (e) { console.log("System initialization..."); }
    }

    // العداد التنازلي
    setInterval(() => {
        if (timeLeft <= 0) {
            timeLeft = 60;
            fetchData();
        } else {
            timeLeft--;
        }
        document.getElementById('timer').innerText = timeLeft + "s";
    }, 1000);

    fetchData(); // تشغيل أولي
</script>
</body>
</html>
