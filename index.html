<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Monitor Logs</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; padding-bottom: 30px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .pfp { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px; }
        .username { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 1.2rem; }
        .bio { font-size: 0.9rem; color: #8b949e; margin-top: 10px; min-height: 40px; }
        .log-box { margin-top: 40px; background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .log-title { color: #f0883e; font-family: monospace; font-size: 1.1rem; border-bottom: 1px solid #21262d; padding-bottom: 10px; margin-bottom: 15px; display: block; }
        .log-entry { font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85rem; padding: 8px 0; border-bottom: 1px solid #21262d; color: #8b949e; text-align: left; direction: ltr; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-size: 0.85rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>System Monitor v1.0</h1>
        <p>تحديث تلقائي عبر GitHub Actions</p>
    </div>
    
    <div id="profiles-grid" class="grid"></div>

    <div class="log-box">
        <span class="log-title">>_ SYSTEM_LOGS</span>
        <div id="logs-container"></div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('data.json?t=' + Date.now());
            const data = await res.json();
            
            const grid = document.getElementById('profiles-grid');
            data.profiles.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.pfp}" class="pfp">
                        <br>
                        <a href="https://instagram.com/${p.username}" class="username" target="_blank">@${p.username}</a>
                        <div class="bio">${p.bio || 'لا يوجد بايو'}</div>
                        <div class="stats">
                            <span>👥 المتابعين: ${p.followers.toLocaleString()}</span>
                        </div>
                    </div>`;
            });

            const logsBox = document.getElementById('logs-container');
            if (data.logs.length === 0) {
                logsBox.innerHTML = '<div class="log-entry">Waiting for changes to log...</div>';
            } else {
                data.logs.reverse().forEach(log => {
                    logsBox.innerHTML += `<div class="log-entry">${log}</div>`;
                });
            }
        } catch (e) {
            console.error("Error loading data:", e);
        }
    }
    loadData();
</script>
</body>
</html>
