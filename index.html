<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Live Monitoring</title>
    <style>
        :root {
            --bg: #0a0c10;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ───── شريط الحالة ───── */
        .system-status {
            width: 100%;
            max-width: 1000px;
            background: rgba(88, 166, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        #timer {
            font-family: monospace;
            color: #f0883e;
            font-size: 1.3rem;
        }

        /* ───── الحاوية الرئيسية split-screen ───── */
        .profiles-split {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .split-divider {
            background: var(--border);
            width: 1px;
        }

        /* ───── بطاقة البروفايل ───── */
        .profile-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 24px 24px;
            position: relative;
            transition: background 0.25s ease;
        }

        .profile-panel:hover {
            background: rgba(255, 255, 255, 0.025);
        }

        /* شارة LIVE */
        .live-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: #e74c3c;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            letter-spacing: 0.8px;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.6; }
        }

        /* صورة البروفايل */
        .pfp-ring {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            border: 3px solid var(--border);
            overflow: hidden;
            background: #0d1117;
            margin-bottom: 16px;
            flex-shrink: 0;
            transition: border-color 0.3s;
        }

        .pfp-ring.live-ring {
            border-color: #e74c3c;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.15);
        }

        .pfp-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* بيانات الحساب */
        .profile-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            text-align: center;
            color: var(--text-main);
        }

        .profile-username {
            font-size: 0.875rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 16px;
            display: block;
            text-align: center;
        }

        .profile-username:hover { text-decoration: underline; }

        /* البايو */
        .bio-area {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.65;
            min-height: 60px;
            text-align: center;
            margin-bottom: 18px;
        }

        /* الفاصل */
        .panel-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin-bottom: 16px;
        }

        /* الإحصائيات */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .stat-cell {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 8px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .stat-label {
            display: block;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        /* ───── سجل العمليات ───── */
        .log-box {
            width: 100%;
            max-width: 1000px;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .log-title {
            color: #f0883e;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: 'Consolas', monospace;
        }

        .log-entry {
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            padding: 8px 6px;
            border-bottom: 1px solid #21262d;
            color: #7d8590;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .log-entry:last-child { border-bottom: none; }

        .log-time {
            color: #58a6ff;
            min-width: 130px;
            flex-shrink: 0;
        }

        /* ───── موبايل ───── */
        @media (max-width: 620px) {
            .profiles-split { grid-template-columns: 1fr; }
            .split-divider { width: 100%; height: 1px; }
        }
    </style>
</head>
<body>

    <!-- شريط الحالة -->
    <div class="system-status">
        <div>📡 نظام المراقبة النشط: <strong>LIVE_SYNC</strong></div>
        <div style="margin-top: 5px;">تحديث السيرفر القادم خلال: <span id="timer">60s</span></div>
    </div>

    <!-- الحسابين split-screen -->
    <div id="profiles-grid" class="profiles-split"></div>

    <!-- سجل العمليات -->
    <div class="log-box">
        <div class="log-title">[ SYSTEM_OPERATIONS_LOG ]</div>
        <div id="logs-container"></div>
    </div>

<script>
    let timeLeft = 60;

    async function fetchData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            const data = await response.json();

            // ── تحديث بطاقات البروفايل ──
            const grid = document.getElementById('profiles-grid');
            grid.innerHTML = '';

            data.profiles.forEach((p, index) => {
                const isLive = !!p.is_live;

                const panel = document.createElement('div');
                panel.className = 'profile-panel';
                panel.innerHTML = `
                    ${isLive ? '<span class="live-badge">LIVE</span>' : ''}
                    <div class="pfp-ring ${isLive ? 'live-ring' : ''}">
                        <img src="${p.pfp}" alt="PFP" onerror="this.style.display='none'">
                    </div>
                    <p class="profile-name">${p.full_name || '—'}</p>
                    <a class="profile-username" href="https://instagram.com/${p.username}" target="_blank">@${p.username}</a>
                    <div class="bio-area">${p.bio || 'لا يوجد وصف حالياً'}</div>
                    <div class="panel-divider"></div>
                    <div class="stats-row">
                        <div class="stat-cell">
                            <span class="stat-value">${Number(p.followers).toLocaleString()}</span>
                            <span class="stat-label">متابع</span>
                        </div>
                        <div class="stat-cell">
                            <span class="stat-value" style="font-size:0.8rem;">${p.id}</span>
                            <span class="stat-label">ID</span>
                        </div>
                    </div>
                `;
                grid.appendChild(panel);

                // فاصل بين الحسابين (وليس بعد الأخير)
                if (index < data.profiles.length - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'split-divider';
                    grid.appendChild(divider);
                }
            });

            // ── تحديث السجل ──
            const logsBox = document.getElementById('logs-container');
            logsBox.innerHTML = '';
            const logs = [...data.logs].reverse();

            if (logs.length === 0) {
                logsBox.innerHTML = '<div class="log-entry"><span class="log-time">—</span><span>لا توجد سجلات بعد</span></div>';
            } else {
                logs.forEach(log => {
                    const parts = log.split('] ');
                    const time = parts[0]?.replace('[', '') || '';
                    const msg  = parts.slice(1).join('] ') || log;
                    logsBox.innerHTML += `
                        <div class="log-entry">
                            <span class="log-time">${time}</span>
                            <span>${msg}</span>
                        </div>`;
                });
            }

        } catch (e) {
            console.log('System initialization...', e);
        }
    }

    // العداد التنازلي
    setInterval(() => {
        if (timeLeft <= 0) {
            timeLeft = 60;
            fetchData();
        } else {
            timeLeft--;
        }
        document.getElementById('timer').innerText = timeLeft + 's';
    }, 1000);

    fetchData();
</script>
</body>
</html>
