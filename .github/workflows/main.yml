name: Insta Monitor Sync
on:
  schedule:
    - cron: '0 */6 * * *' # يحدث كل 6 ساعات
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install instaloader
      - name: Fetch Instagram Data
        run: python update_insta.py
      - name: Save Changes
        run: |
          git config --global user.name 'Monitor-Bot'
          git config --global user.email 'bot@github.com'
          git add data.json
          git commit -m "System: Update logs" || exit 0
          git push
